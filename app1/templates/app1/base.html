{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College App</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#0b3c5d;">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold" href="/">CollegeApp</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav2">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav2">

      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/colleges/">Colleges</a></li>
        <li class="nav-item"><a class="nav-link" href="/students/">Students</a></li>
        <li class="nav-item"><a class="nav-link" href="/address/">Address</a></li>
        <li class="nav-item"><a class="nav-link" href="/login/">login</a></li>
      </ul>

      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search">
        <button class="btn btn-light" type="submit">Search</button>
      </form>

    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
